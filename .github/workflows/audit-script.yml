name: Security Audit

on:
  push:
    branches: [master]

permissions:
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run security audit
        id: audit
        run: |
          # pipefail: 파이프라인 중 실패한 명령의 exit code를 사용
          # tee는 항상 0(성공 처리)이므로 if 구문 통과 -> npm audit의 exit code 기준으로 분기
          set -o pipefail
          if ! npm audit --prod 2>&1 | tee audit-result.txt; then
            echo "has_vulnerability=true" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerability=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing issue
        if: steps.audit.outputs.has_vulnerability == 'true'
        id: check_issue
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security',
              state: 'open'
            });
            const exists = issues.data.some(issue =>
              issue.title.includes('보안 취약점 발견 - pnpm audit')
            );
            core.setOutput('exists', exists.toString());

      - name: Create issue on vulnerability found
        if: steps.audit.outputs.has_vulnerability == 'true' && steps.check_issue.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditResult = fs.readFileSync('audit-result.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 보안 취약점 발견 - pnpm audit',
              body: [
                '`master` 브랜치에서 보안 취약점이 발견되었습니다.',
                '',
                `커밋: ${context.sha}`,
                '',
                '<details>',
                '<summary>audit 결과</summary>',
                '',
                '```',
                auditResult,
                '```',
                '',
                '</details>'
              ].join('\n'),
              labels: ['security']
            });
